name: ci-docs

on:
  workflow_call:

jobs:
  lint-build:
    runs-on: ubuntu-24.04
    steps:
      - name: Project checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Restore pollux cache
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          key: ${{ runner.os }}-pollux-cache
          path: /home/runner/.pollux

      - name: Lint Markdown files
        uses: rvben/rumdl@63d438f754667a8617cad7613f0d100fe4e8823d # v0.2.23

      - name: Configure Github Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Setup Rust tools
        uses: ./.github/actions/setup-rust

      - name: Generate pollux report (small)
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          RUST_LOG=info cargo run --bin pollux -- inquire --output html --coverage small
          mkdir -p report && mv pollux-report.html report/index.html

      - name: Generate pollux report (large)
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          RUST_LOG=info cargo run --bin pollux -- inquire --output html --coverage large
          mkdir -p report && mv pollux-report.html report/index.html

      - name: Upload assets Github Pages assets
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: report

      - name: Deploy assets to GitHub Pages
        if: ${{ github.ref == 'refs/heads/main' }}
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Save pollux cache
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        with:
          key: ${{ runner.os }}-pollux-cache
          path: /home/runner/.pollux
